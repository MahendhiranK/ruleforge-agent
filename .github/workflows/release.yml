name: Release (Package .NET tool)

on:
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pack tool
        run: dotnet pack src/QualityAgent.Cli/QualityAgent.Cli.csproj -c Release -o dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: dist/
