name: Quality Agent

on:
  pull_request:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore

      - name: Sonar Begin (PR only)
        if: github.event_name == 'pull_request'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          dotnet sonarscanner begin             /k:"$SONAR_PROJECT_KEY"             /d:sonar.host.url="$SONAR_HOST_URL"             /d:sonar.token="$SONAR_TOKEN"             /d:sonar.pullrequest.key="${{ github.event.pull_request.number }}"             /d:sonar.pullrequest.branch="${{ github.head_ref }}"             /d:sonar.pullrequest.base="${{ github.base_ref }}"

      - name: Sonar Begin (push to main)
        if: github.event_name == 'push'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          dotnet sonarscanner begin             /k:"$SONAR_PROJECT_KEY"             /d:sonar.host.url="$SONAR_HOST_URL"             /d:sonar.token="$SONAR_TOKEN"

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Sonar End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      # Report-only gate (recommended default)
      - name: Run QualityAgent (gate + report)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          dotnet run --project src/QualityAgent.Cli -- check --policy .qualityagent/policy.yml --pr "${{ github.event.pull_request.number }}" --branch "${{ github.head_ref }}"

      # Optional: AutoFix run. Keep disabled by default.
      # Enable by changing command to: autofix and setting policy.aiFoundry.enable=true
      # - name: Run QualityAgent AutoFix
      #   env:
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      #     AZURE_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
      #     AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
      #     AZURE_FOUNDRY_MODEL: ${{ secrets.AZURE_FOUNDRY_MODEL }}
      #   run: |
      #     dotnet run --project src/QualityAgent.Cli -- autofix --policy .qualityagent/policy.yml --pr "${{ github.event.pull_request.number }}" --branch "${{ github.head_ref }}"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: quality-agent-reports
          path: artifacts/
